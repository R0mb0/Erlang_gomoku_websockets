<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erlang Gomoku Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Wood background for the board */
        .board-bg {
            background-color: #e3c494;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.05' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' fill='%23e3c494'/%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='0.15' mix-blend-mode='multiply'/%3E%3C/svg%3E");
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .cell {
            position: relative;
            cursor: pointer;
        }

        /* Drawing the grid lines inside the cells */
        .cell::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background-color: #5c4033;
            z-index: 1;
        }
        .cell::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 1px;
            background-color: #5c4033;
            z-index: 1;
        }

        /* The stones (pedine) */
        .stone {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            z-index: 10;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.4);
            transform: scale(0);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .stone.active {
            transform: scale(1);
        }

        .stone.black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
        }

        .stone.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
        }
    </style>
</head>
<body class="bg-slate-800 text-slate-100 font-sans antialiased min-h-screen flex flex-col items-center py-8">

    <div class="w-full max-w-4xl px-4 flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div>
            <h1 class="text-4xl font-bold text-emerald-400 drop-shadow-md">Gomoku Websocket</h1>
            <p class="text-slate-400 text-sm mt-1">Powered by Erlang & Tuple Space</p>
        </div>
        
        <div class="flex flex-col gap-2 bg-slate-700 p-4 rounded-lg border border-slate-600 shadow-inner">
            <div class="flex items-center gap-3">
                <div id="status-indicator" class="w-3 h-3 rounded-full bg-rose-500 shadow-[0_0_8px_#f43f5e]"></div>
                <span id="status-text" class="text-sm font-semibold text-slate-300">Disconnected</span>
                <button id="btn-connect" class="ml-2 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold py-1 px-3 rounded transition-colors">Connect</button>
            </div>
            
            <div class="flex items-center gap-3 mt-2 pt-2 border-t border-slate-600">
                <span class="text-sm font-semibold">Play as:</span>
                <select id="player-selector" class="bg-slate-800 text-sm border border-slate-500 rounded px-2 py-1 focus:outline-none focus:border-emerald-500">
                    <option value="player_1">Player 1 (Black)</option>
                    <option value="player_2">Player 2 (White)</option>
                </select>
                <button id="btn-init" class="ml-auto bg-amber-600 hover:bg-amber-500 text-white text-xs font-bold py-1 px-3 rounded transition-colors disabled:opacity-50">Init Board</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded shadow-lg text-white font-bold transition-opacity duration-300 opacity-0 pointer-events-none z-50"></div>

    <div class="board-bg p-4 rounded-sm border-4 border-amber-900">
        <div id="board" class="grid grid-cols-[repeat(20,minmax(0,1fr))] grid-rows-[repeat(20,minmax(0,1fr))] w-[400px] h-[400px] md:w-[600px] md:h-[600px] border-2 border-[#5c4033]">
            </div>
    </div>

    <script>
        const BOARD_SIZE = 20;
        let ws;
        const boardEl = document.getElementById('board');
        const btnConnect = document.getElementById('btn-connect');
        const btnInit = document.getElementById('btn-init');
        const playerSelector = document.getElementById('player-selector');
        const statusIndicator = document.getElementById('status-indicator');
        const statusText = document.getElementById('status-text');
        const toast = document.getElementById('toast');

        // Show a temporary message
        function showToast(message, type = 'error') {
            toast.textContent = message;
            toast.className = `fixed top-5 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded shadow-xl text-white font-bold transition-opacity duration-300 z-50 ${type === 'error' ? 'bg-rose-600' : 'bg-emerald-600'}`;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3000);
        }

        // Generate the grid visually
        function renderBoard() {
            boardEl.innerHTML = '';
            for (let y = 1; y <= BOARD_SIZE; y++) {
                for (let x = 1; x <= BOARD_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;
                    
                    const stone = document.createElement('div');
                    stone.className = 'stone';
                    stone.id = `stone-${x}-${y}`;
                    
                    cell.appendChild(stone);
                    
                    // Click event to send move
                    cell.addEventListener('click', () => {
                        if (!ws || ws.readyState !== WebSocket.OPEN) {
                            showToast("Not connected to server!");
                            return;
                        }
                        const currentPlayer = playerSelector.value;
                        const payload = {
                            action: "make_move",
                            player: currentPlayer,
                            x: x,
                            y: y
                        };
                        ws.send(JSON.stringify(payload));
                    });
                    
                    boardEl.appendChild(cell);
                }
            }
        }

        // WebSocket Connection Logic
        btnConnect.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) return;
            
            ws = new WebSocket('ws://localhost:8080/ws');
            
            ws.onopen = () => {
                statusIndicator.className = 'w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]';
                statusText.textContent = 'Connected';
                showToast("Connected to Erlang Backend!", "success");
            };

            ws.onmessage = (event) => {
                const response = JSON.parse(event.data);
                
                if (response.status === "board_initialized") {
                    showToast("Board Reset!", "success");
                    // Clear all stones visually
                    document.querySelectorAll('.stone').forEach(s => s.className = 'stone');
                } 
                else if (response.status === "move_accepted") {
                    const stoneEl = document.getElementById(`stone-${response.x}-${response.y}`);
                    if (stoneEl) {
                        const colorClass = response.player === "player_1" ? "black" : "white";
                        stoneEl.className = `stone active ${colorClass}`;
                    }
                }
                else if (response.status === "win") {
                    // Place the final winning stone
                    const stoneEl = document.getElementById(`stone-${response.x}-${response.y}`);
                    if (stoneEl) {
                        const colorClass = response.player === "player_1" ? "black" : "white";
                        stoneEl.className = `stone active ${colorClass}`;
                    }
                    
                    // Announce the winner!
                    const winnerName = response.player === "player_1" ? "Black (Player 1)" : "White (Player 2)";
                    showToast(`🎉 ${winnerName} WINS THE GAME! 🎉`, "success");
                }
                else if (response.status === "error") {
                    let errMsg = "Error!";
                    if (response.reason === "not_your_turn") errMsg = "Not your turn!";
                    if (response.reason === "cell_occupied") errMsg = "Cell is already taken!";
                    if (response.reason === "out_of_bounds") errMsg = "Invalid coordinates!";
                    showToast(errMsg, "error");
                }
            };

            ws.onclose = () => {
                statusIndicator.className = 'w-3 h-3 rounded-full bg-rose-500 shadow-[0_0_8px_#f43f5e]';
                statusText.textContent = 'Disconnected';
                ws = null;
            };
        });

        // Init Board Button
        btnInit.addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: "init_board" }));
            } else {
                showToast("Please connect first!");
            }
        });

        // Initial render
        renderBoard();
    </script>
</body>
</html>
